name: CI/CD Pipeline

on:
  push:
    branches:
      - master   # or main (based on your branch)

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest
            docker rm -f my-app || true
            docker run -d -p 3000:3000 --name my-app ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest
